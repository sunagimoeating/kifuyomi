<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="棋譜読み">
    <title>棋譜読みトレーニング</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>

<body>
    <div class="app-container">
        <!-- 背景の装飾用サークル -->
        <div class="bg-circle circle-1"></div>
        <div class="bg-circle circle-2"></div>
        <div class="bg-circle circle-3"></div>

        <main class="glass-panel main-panel">
            <!-- ヘッダー＋入力インジケータを一体化 -->
            <header>
                <!-- 左：トグル群 -->
                <div class="toggles">
                    <label class="toggle-switch">
                        <input type="checkbox" id="guide-toggle" checked>
                        <span class="slider"></span>
                        <span class="toggle-label">目盛り</span>
                    </label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="turn-toggle">
                        <span class="slider"></span>
                        <span class="toggle-label">後手</span>
                    </label>
                </div>

                <!-- 右：入力インジケータ（筋・段） -->
                <div class="input-display" id="input-display">
                    <div id="input-col" class="input-char placeholder">筋</div>
                    <div id="input-row" class="input-char placeholder">段</div>
                </div>
            </header>

            <!--
                盤面エリア
                先手: 列目盛り=上辺、行目盛り=右辺
                後手: 列目盛り=下辺、行目盛り=左辺
                .gote クラスを board-container に付与して CSS で切り替える
            -->
            <div class="board-container" id="board-container">
                <!-- 列目盛り（先手: top, 後手: bottom） -->
                <div class="board-guides horizontal-guide" id="h-guide">
                    <span>９</span><span>８</span><span>７</span><span>６</span><span>５</span><span>４</span><span>３</span><span>２</span><span>１</span>
                </div>
                <!-- 盤面 -->
                <div class="shogi-board" id="shogi-board">
                    <!-- JSでマスを生成 -->
                </div>
                <!-- 行目盛り（先手: right, 後手: left） -->
                <div class="board-guides vertical-guide" id="v-guide">
                    <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>七</span><span>八</span><span>九</span>
                </div>
            </div>

            <!-- キーパッドエリア -->
            <div class="keypad-area">
                <div class="keypad-grid" id="main-keypad">
                    <button class="key-btn num-key" data-val="1">１</button>
                    <button class="key-btn num-key" data-val="2">２</button>
                    <button class="key-btn num-key" data-val="3">３</button>
                    <button class="key-btn num-key" data-val="4">４</button>
                    <button class="key-btn num-key" data-val="5">５</button>
                    <button class="key-btn num-key" data-val="6">６</button>
                    <button class="key-btn num-key" data-val="7">７</button>
                    <button class="key-btn num-key" data-val="8">８</button>
                    <button class="key-btn num-key" data-val="9">９</button>
                    <!-- 下段：空白・取消・空白 -->
                    <div class="key-spacer"></div>
                    <button class="key-btn action-key" id="clear-btn">取消</button>
                    <div class="key-spacer"></div>
                </div>
            </div>

            <div class="controls">
                <button id="start-btn" class="primary-btn">スタート</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }
    </script>
</body>

</html>
